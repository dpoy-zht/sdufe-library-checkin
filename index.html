<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SDUFE Library Check-in</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  :root {
    --bg-deep:    #08090a;
    --bg-card:    #0f1114;
    --bg-surface: #16181d;
    --border:     rgba(255,255,255,0.07);
    --border-hover: rgba(255,255,255,0.12);
    --text-primary:   #edefef;
    --text-secondary: #8b8f98;
    --text-tertiary:  #5a5e66;
    --accent:     #5b6ad8;
    --accent-hover: #717fff;
    --green:      #28a745;
    --green-bg:   rgba(40,167,69,0.12);
    --amber:      #f0a030;
    --amber-bg:   rgba(240,160,48,0.12);
    --blue:       #4b9fff;
    --blue-bg:    rgba(75,159,255,0.12);
    --radius:     18px;
    --radius-sm:  12px;
    --font:       'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  }

  body {
    font-family: var(--font);
    background: var(--bg-deep);
    min-height: 100dvh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* Ambient glow behind card */
  body::before {
    content: '';
    position: fixed;
    top: 50%; left: 50%;
    width: 500px; height: 500px;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle, rgba(91,106,216,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .card {
    position: relative;
    z-index: 1;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 40px 32px 32px;
    max-width: 400px;
    width: 100%;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.03),
      0 2px 8px rgba(0,0,0,0.3),
      0 8px 32px rgba(0,0,0,0.4);
    backdrop-filter: blur(20px);
    transition: border-color 0.3s ease;
  }

  /* Header */
  .header { text-align: center; margin-bottom: 36px; }
  .header .logo {
    width: 48px; height: 48px;
    margin: 0 auto 16px;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .header h1 {
    font-size: 22px;
    font-weight: 600;
    color: var(--text-primary);
    letter-spacing: -0.02em;
    margin-bottom: 4px;
  }
  .header p {
    font-size: 13px;
    font-weight: 400;
    color: var(--text-tertiary);
  }

  /* Buttons */
  .btn-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }

  .btn {
    width: 100%;
    padding: 15px 20px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-family: var(--font);
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    color: var(--text-primary);
    background: var(--bg-surface);
    display: flex;
    align-items: center;
    gap: 12px;
    transition: all 0.2s cubic-bezier(0.16,1,0.3,1);
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .btn:hover {
    border-color: var(--border-hover);
    background: #1c1f27;
    transform: translateY(-1px);
  }
  .btn:active {
    transform: scale(0.985);
    transition-duration: 0.08s;
  }
  .btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
    transform: none;
    border-color: var(--border);
    background: var(--bg-surface);
  }
  .btn svg { flex-shrink: 0; }

  .btn .label { flex:1; text-align: left; }
  .btn .label .title { font-size: 15px; font-weight: 600; color: var(--text-primary); }
  .btn .label .desc  { font-size: 11px; font-weight: 400; color: var(--text-tertiary); margin-top: 2px; }

  .btn-1 { border-left: 2px solid #28a745; }
  .btn-2 { border-left: 2px solid #f0a030; }
  .btn-3 { border-left: 2px solid #4b9fff; }

  /* Toast */
  .toast {
    text-align: center; padding: 12px 16px; border-radius: var(--radius-sm);
    font-size: 13px; font-weight: 500; margin-bottom: 16px;
    display: none; animation: slideDown 0.3s ease;
    border: 1px solid transparent;
  }
  @keyframes slideDown { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
  .toast.loading { background: rgba(91,106,216,0.08); border-color: rgba(91,106,216,0.2); color: #a8b4ff; display:block; }
  .toast.success { background: var(--green-bg); border-color: rgba(40,167,69,0.25); color: #5dd68b; display:block; }
  .toast.error   { background: rgba(220,53,69,0.08); border-color: rgba(220,53,69,0.2); color: #f87c8a; display:block; }

  /* Jump card */
  .jump-card {
    background: var(--bg-surface);
    border: 1px solid rgba(40,167,69,0.2);
    border-radius: var(--radius);
    padding: 24px;
    text-align: center;
    display: none;
    animation: slideDown 0.35s ease;
  }
  .jump-card h3 {
    font-size: 14px; font-weight: 500; color: #5dd68b; margin-bottom: 16px;
  }
  .jump-btn {
    display: inline-block; width: 100%;
    padding: 14px;
    background: #28a745;
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    font-family: var(--font);
    font-size: 15px; font-weight: 600;
    text-decoration: none; cursor: pointer;
    transition: all 0.2s ease;
  }
  .jump-btn:hover { background: #2dc653; transform: translateY(-1px); }
  .jump-btn:active { transform: scale(0.98); }

  .copy-row {
    display: flex; gap: 8px; margin-top: 12px;
  }
  .copy-input {
    flex: 1; padding: 10px 12px;
    border: 1px solid var(--border); border-radius: 8px;
    font-size: 11px; font-family: var(--font);
    color: var(--text-secondary); background: var(--bg-card);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .copy-btn {
    padding: 10px 16px; border: 1px solid var(--border);
    border-radius: 8px; background: transparent;
    color: var(--text-secondary); font-family: var(--font);
    font-size: 12px; font-weight: 500; cursor: pointer;
    white-space: nowrap; transition: all 0.2s ease;
  }
  .copy-btn:hover { border-color: var(--border-hover); color: var(--text-primary); }
  .copy-btn.copied { border-color: #28a745; color: #5dd68b; }

  /* Tips */
  .tips {
    margin-top: 20px; padding: 16px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 12px; color: var(--text-tertiary);
    line-height: 1.7;
  }
  .tips span { color: var(--text-secondary); }
  .tips .warn { color: #f0a030; font-weight: 500; }

  .hidden { display: none !important; }

  /* Loading spinner */
  .spinner { display: inline-block; width: 4px; height: 4px; border-radius: 50%; background: currentColor; opacity: 0.6; margin-right: 8px; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }

  /* Pulsing dot for loading */
  @keyframes dotPulse { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }
</style>
</head>
<body>

<div class="card" id="appCard">
  <!-- Header -->
  <div class="header">
    <div class="logo">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#8b8f98" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
        <line x1="8" y1="7" x2="16" y2="7"/>
        <line x1="8" y1="11" x2="14" y2="11"/>
      </svg>
    </div>
    <h1>SDUFE Library</h1>
    <p>Remote Check-in System</p>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- Action buttons -->
  <div class="btn-group" id="btnArea">
    <button class="btn btn-1" onclick="doCheckin('1')">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#5dd68b" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M13 12H3"/>
      </svg>
      <span class="label"><span class="title">Check In</span><span class="desc">签到入馆</span></span>
    </button>
    <button class="btn btn-2" onclick="doCheckin('2')">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#f0a030" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
      </svg>
      <span class="label"><span class="title">Temporary Leave</span><span class="desc">临时离馆</span></span>
    </button>
    <button class="btn btn-3" onclick="doCheckin('3')">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#4b9fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/>
      </svg>
      <span class="label"><span class="title">Check Out</span><span class="desc">签离出馆</span></span>
    </button>
  </div>

  <!-- Jump card -->
  <div class="jump-card" id="jumpCard">
    <h3 id="jumpTitle">Check In</h3>
    <a class="jump-btn" id="jumpLink" href="#" target="_self">Open Library Check-in Page</a>
    <div class="copy-row">
      <input class="copy-input" id="linkInput" readonly placeholder="Link will appear here...">
      <button class="copy-btn" id="copyBtn" onclick="copyLink()">Copy</button>
    </div>
  </div>

  <!-- Tips -->
  <div class="tips">
    <span>Connect to <span style="color:#edefef;font-weight:500">SDUFE WiFi</span> before use.<br></span>
    <span>Ensure you are logged into the library WeChat account.<br></span>
    <span class="warn">Time limit: 100 min for temporary leave (excluding noon).</span>
  </div>
</div>

<script>
(function(){
  const K=[7,3,9,1,5,8,2,4,6,7], E="816b7d7b6d7c3a3c3e3f";
  const v=p=>p.length===K.length&&p.split('').map((c,i)=>(c.charCodeAt(0)+K[i]).toString(16).padStart(2,'0')).join('')===E;
  if(localStorage.getItem('la')==='1')return;
  const i=prompt('Enter password');
  if(!i){document.body.innerHTML='<div style="color:#8b8f98;font-family:sans-serif;text-align:center;margin-top:30dvh;font-size:14px">Cancelled</div>';return}
  if(!v(i)){document.body.innerHTML='<div style="color:#8b8f98;font-family:sans-serif;text-align:center;margin-top:30dvh;font-size:14px">Access denied</div>';return}
  localStorage.setItem('la','1');
})();

const A='https://libst.sdufe.edu.cn/api.php/v3qrtime';
const B='http://www.skalibrary.net/wx/scancheck';
const toast=document.getElementById('toast');
const jc=document.getElementById('jumpCard');
const jl=document.getElementById('jumpLink');
const li=document.getElementById('linkInput');
const cb=document.getElementById('copyBtn');

function st(m,c){toast.textContent=m;toast.className='toast '+c}
function sb(d){document.querySelectorAll('#btnArea .btn').forEach(b=>b.disabled=d)}

async function doCheckin(t){
  const n={'1':'Check In','2':'Temporary Leave','3':'Check Out'};
  st('Fetching server timestamp...','loading'); jc.style.display='none'; sb(true);
  try{
    const r=await fetch(A+'?_='+Date.now(),{headers:{'Accept':'application/json'},signal:AbortSignal.timeout(10000)});
    const d=await r.json();
    if(d.status!==1||!d.data){st(d.msg||'Server error. Connect to SDUFE WiFi.','error');sb(false);return}
    const u=B+'?school=sdufe&type='+t+'&t='+d.data;
    st('Link ready. Tap below to proceed.','success');
    document.getElementById('btnArea').classList.add('hidden');
    document.getElementById('jumpTitle').textContent=n[t];
    jl.href=u; li.value=u; cb.textContent='Copy'; cb.className='copy-btn'; jc.style.display='block';
  }catch(e){
    st(e.message+' — Connect to SDUFE WiFi','error'); sb(false);
  }
}

async function copyLink(){
  try{await navigator.clipboard.writeText(li.value);cb.textContent='Copied';cb.className='copy-btn copied'}
  catch(_){li.select();document.execCommand('copy');cb.textContent='Copied';cb.className='copy-btn copied'}
  setTimeout(()=>{cb.textContent='Copy';cb.className='copy-btn'},2000);
}
</script>
</body>
</html>
