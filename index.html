<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>奶龙图书馆签到</title>

<!-- ===== 圆润卡通字体 ===== -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Varela+Round&display=swap" rel="stylesheet">

<style>
/* ============================================================
   🎨 奶龙奶油卡通风主题变量
   修改以下变量即可一键换肤
n ============================================================ */
:root {
  /* 主色调 - 马卡龙奶油系 */
  --cream-yellow: #FFE4A0;      /* 鹅黄 */
  --cream-white: #FFFDF7;       /* 奶白 */
  --mint-green: #B8F0D8;        /* 浅薄荷绿 */
  --sakura-pink: #FFD1DC;       /* 樱花粉 */
  --sky-blue: #B8E4F0;          /* 天蓝 */
  --lavender: #E8D5F2;          /* 薰衣草 */
  --peach: #FFD4B3;             /* 蜜桃 */

  /* 功能色 */
  --checkin-color: #A0D8EF;     /* 签到 - 淡蓝 */
  --tempout-color: #FFD6A5;     /* 临时离馆 - 暖橙 */
  --checkout-color: #FFB3BA;    /* 签离 - 柔粉 */

  /* 文字色 */
  --text-main: #5A4A3A;         /* 主文字 - 暖棕 */
  --text-sub: #9A8B7A;          /* 次要文字 */
  --text-light: #FFF;           /* 亮色文字 */

  /* 背景 */
  --bg-page: linear-gradient(180deg, #FFF9E8 0%, #FFF0F5 40%, #E8F5F0 100%);
  --bg-card: rgba(255, 255, 255, 0.72);
  --bg-glass: rgba(255, 255, 255, 0.55);

  /* 阴影 */
  --shadow-soft: 0 8px 32px rgba(139, 119, 99, 0.12);
  --shadow-hover: 0 12px 40px rgba(139, 119, 99, 0.18);
  --shadow-inset: inset 0 2px 8px rgba(255, 255, 255, 0.8);

  /* 圆角 */
  --radius-sm: 16px;
  --radius-md: 24px;
  --radius-lg: 32px;
  --radius-xl: 40px;

  /* 字体 */
  --font-cartoon: 'Nunito', 'Varela Round', 'PingFang SC', 'Microsoft YaHei', sans-serif;
}

/* ============================================================
   基础重置
   ============================================================ */
* {
  margin: 0; padding: 0; box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

html, body {
  font-family: var(--font-cartoon);
  background: var(--bg-page);
  background-attachment: fixed;
  color: var(--text-main);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ============================================================
   ☁️ 漂浮云朵装饰
   ============================================================ */
.cloud {
  position: fixed;
  background: rgba(255, 255, 255, 0.85);
  border-radius: 50px;
  pointer-events: none;
  z-index: 0;
  filter: blur(1px);
}
.cloud::before, .cloud::after {
  content: '';
  position: absolute;
  background: rgba(255, 255, 255, 0.85);
  border-radius: 50%;
}
/* 云朵1 */
.cloud-1 {
  width: 80px; height: 30px;
  top: 12%; left: -100px;
  animation: floatCloud 25s linear infinite;
}
.cloud-1::before { width: 40px; height: 40px; top: -18px; left: 12px; }
.cloud-1::after  { width: 35px; height: 35px; top: -12px; left: 38px; }
/* 云朵2 */
.cloud-2 {
  width: 60px; height: 24px;
  top: 28%; left: -80px;
  animation: floatCloud 32s linear infinite;
  animation-delay: -8s;
}
.cloud-2::before { width: 32px; height: 32px; top: -14px; left: 10px; }
.cloud-2::after  { width: 28px; height: 28px; top: -10px; left: 30px; }
/* 云朵3 */
.cloud-3 {
  width: 100px; height: 36px;
  top: 55%; left: -120px;
  animation: floatCloud 28s linear infinite;
  animation-delay: -15s;
}
.cloud-3::before { width: 50px; height: 50px; top: -22px; left: 15px; }
.cloud-3::after  { width: 42px; height: 42px; top: -16px; left: 48px; }
@keyframes floatCloud {
  0%   { transform: translateX(0); }
  100% { transform: translateX(calc(100vw + 200px)); }
}

/* ============================================================
   🐉 迷你奶龙贴纸装饰（页面边角）
   ============================================================ */
.sticker {
  position: fixed;
  pointer-events: none;
  z-index: 5;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));
}
.sticker img {
  width: 100%; height: 100%;
  object-fit: contain;
}
.sticker-tr {
  top: 80px; right: 8px;
  width: 60px; height: 60px;
  animation: gentleBounce 3s ease-in-out infinite;
}
.sticker-bl {
  bottom: 60px; left: 8px;
  width: 70px; height: 70px;
  animation: gentleBounce 3.5s ease-in-out infinite;
  animation-delay: 0.5s;
}
.sticker-br {
  bottom: 100px; right: 8px;
  width: 55px; height: 55px;
  animation: gentleBounce 2.8s ease-in-out infinite;
  animation-delay: 1s;
}
@keyframes gentleBounce {
  0%, 100% { transform: translateY(0) rotate(-5deg); }
  50%      { transform: translateY(-10px) rotate(5deg); }
}

/* ============================================================
   📱 手机容器（电脑端居中）
   ============================================================ */
.phone-frame {
  max-width: 480px;
  margin: 0 auto;
  position: relative;
  z-index: 1;
  min-height: 100vh;
  padding-bottom: 40px;
}

/* ============================================================
   🔝 顶部导航栏
   ============================================================ */
.top-nav {
  position: sticky;
  top: 0;
  z-index: 20;
  background: linear-gradient(135deg, var(--cream-yellow) 0%, var(--peach) 100%);
  border-radius: 0 0 var(--radius-lg) var(--radius-lg);
  padding: 16px 20px 14px;
  box-shadow: var(--shadow-soft);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.nav-left {
  display: flex;
  align-items: center;
  gap: 10px;
}
.menu-btn {
  width: 40px; height: 40px;
  border-radius: 14px;
  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(8px);
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  transition: all 0.2s;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.menu-btn:active { transform: scale(0.92); background: rgba(255,255,255,0.9); }
  .nav-title {
    font-size: 20px;
    font-weight: 800;
    color: var(--text-main);
    letter-spacing: 0.5px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .nav-icon {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    object-fit: cover;
    vertical-align: middle;
  }
.nav-time {
  font-size: 15px;
  font-weight: 700;
  color: var(--text-sub);
  background: rgba(255,255,255,0.5);
  padding: 6px 12px;
  border-radius: 12px;
}

/* ============================================================
   📋 侧边菜单栏
   ============================================================ */
.side-menu {
  position: fixed;
  top: 0; left: 0;
  width: 260px; height: 100vh;
  background: linear-gradient(180deg, #FFF9E8 0%, #FFF0F5 100%);
  z-index: 100;
  transform: translateX(-100%);
  transition: transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  box-shadow: 8px 0 32px rgba(0,0,0,0.1);
  border-radius: 0 var(--radius-lg) var(--radius-lg) 0;
  overflow: hidden;
}
.side-menu.open { transform: translateX(0); }
.menu-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.2);
  z-index: 99;
  display: none;
  backdrop-filter: blur(4px);
}
.menu-overlay.show { display: block; }
.menu-header {
  padding: 28px 20px 20px;
  background: linear-gradient(135deg, var(--cream-yellow), var(--peach));
  text-align: center;
}
.menu-avatar {
  width: 72px; height: 72px;
  border-radius: 50%;
  border: 4px solid #FFF;
  box-shadow: 0 4px 16px rgba(0,0,0,0.1);
  object-fit: cover;
  margin-bottom: 10px;
}
.menu-header h3 {
  font-size: 18px; font-weight: 800;
  color: var(--text-main);
}
.menu-header p {
  font-size: 13px; color: var(--text-sub);
  margin-top: 4px;
}
.menu-list {
  padding: 12px;
}
.menu-item {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 16px;
  border-radius: var(--radius-sm);
  margin-bottom: 8px;
  cursor: pointer;
  transition: all 0.2s;
  font-size: 15px;
  font-weight: 700;
  color: var(--text-main);
}
.menu-item:hover { background: rgba(255,228,160,0.4); }
.menu-item .icon { font-size: 22px; }
.menu-badge {
  margin-left: auto;
  background: var(--sakura-pink);
  color: #FFF;
  font-size: 12px;
  font-weight: 800;
  padding: 3px 10px;
  border-radius: 20px;
}

/* ============================================================
   🍰 内容区
   ============================================================ */
.content {
  padding: 16px;
  position: relative;
  z-index: 1;
}

/* ============================================================
   🎴 状态信息卡片（磨砂玻璃）
   ============================================================ */
.status-card {
  background: var(--bg-card);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: var(--radius-md);
  padding: 24px 20px;
  margin-bottom: 20px;
  box-shadow: var(--shadow-soft), var(--shadow-inset);
  border: 1px solid rgba(255,255,255,0.6);
  position: relative;
  overflow: hidden;
}
.status-card::before {
  content: '';
  position: absolute;
  top: -30px; right: -30px;
  width: 100px; height: 100px;
  background: radial-gradient(circle, var(--cream-yellow) 0%, transparent 70%);
  opacity: 0.5;
  pointer-events: none;
}
.status-nailong {
  position: absolute;
  right: -8px;
  bottom: -10px;
  width: 130px;
  height: auto;
  object-fit: contain;
  z-index: 2;
  pointer-events: none;
}
.status-label {
  font-size: 13px;
  color: var(--text-sub);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 10px;
}
.status-value {
  font-size: 26px;
  font-weight: 900;
  color: var(--text-main);
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.status-dot {
  width: 12px; height: 12px;
  border-radius: 50%;
  background: #34C759;
  box-shadow: 0 0 8px #34C759;
  animation: pulseDot 2s ease-in-out infinite;
}
.status-dot.offline {
  background: #FF9F0A;
  box-shadow: 0 0 8px #FF9F0A;
}
@keyframes pulseDot {
  0%, 100% { transform: scale(1); opacity: 1; }
  50%      { transform: scale(1.3); opacity: 0.7; }
}
.status-detail {
  font-size: 14px;
  color: var(--text-sub);
  font-weight: 600;
}

/* ============================================================
   🎯 快速操作三大功能卡片
   核心：奶龙图片100%不透明，无遮罩，清晰可见
   ============================================================ */
.action-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 16px;
  margin-bottom: 20px;
}
.action-card {
  position: relative;
  border-radius: var(--radius-md);
  min-height: 160px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
  padding: 20px;
  cursor: pointer;
  overflow: hidden;
  box-shadow: var(--shadow-soft);
  transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1),
              box-shadow 0.25s;
  border: 3px solid rgba(255,255,255,0.5);
}
/* hover 放大 */
.action-card:hover {
  transform: scale(1.04);
  box-shadow: var(--shadow-hover);
}
.action-card:active {
  transform: scale(0.97);
}

/* ----- 奶龙背景图（100%不透明，无遮罩） ----- */
.action-card .card-bg-img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center 40%; /* 签到脸部位置 */
  opacity: 1; /* ✅ 完全不透明 */
  z-index: 0;
  /* 无滤镜，无遮罩 */
}

/* ----- 底部文字区域（带轻微渐变底条确保可读性） ----- */
/* 注意：不是全卡片遮罩，只是底部一小条渐变 */
.action-card .card-text-bar {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 55%;
  background: linear-gradient(to top,
    rgba(255,255,255,0.95) 0%,
    rgba(255,255,255,0.7) 40%,
    transparent 100%);
  z-index: 1;
  pointer-events: none;
}

/* ----- 文字内容（在底条之上） ----- */
.action-card .card-content {
  position: relative;
  z-index: 2;
  text-align: center;
  width: 100%;
}
.action-card .card-icon {
  font-size: 32px;
  margin-bottom: 4px;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.15));
}
.action-card .card-name {
  font-size: 20px;
  font-weight: 900;
  color: var(--text-main);
  text-shadow: 0 1px 2px rgba(255,255,255,0.9);
  letter-spacing: 1px;
}
.action-card .card-name-en {
  font-size: 13px;
  font-weight: 700;
  color: var(--text-sub);
  margin-top: 2px;
  text-shadow: 0 1px 2px rgba(255,255,255,0.9);
}

/* ----- 卡片边框色彩 ----- */
.action-card.checkin  { border-color: rgba(160,216,239,0.6); }
.action-card.tempout  { border-color: rgba(255,214,165,0.6); }
.action-card.tempout .card-bg-img { object-position: center 70%; }
.action-card.checkout { border-color: rgba(255,179,186,0.6); }
.action-card.checkout .card-bg-img { object-position: center 95%; }

/* ----- hover 弹出迷你奶龙表情 ----- */
.action-card .mini-nailong {
  position: absolute;
  width: 50px; height: 50px;
  z-index: 3;
  pointer-events: none;
  opacity: 0;
  transform: translateY(10px) scale(0.5);
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15));
}
.action-card.checkin .mini-nailong  { top: 8px; right: 8px; }
.action-card.tempout .mini-nailong  { top: 8px; left: 8px; }
.action-card.checkout .mini-nailong { bottom: 55px; right: 12px; }

.action-card:hover .mini-nailong {
  opacity: 1;
  transform: translateY(0) scale(1) rotate(10deg);
}

/* ============================================================
   📜 历史记录
   ============================================================ */
.history-section { margin-bottom: 20px; }
.history-title {
  font-size: 13px;
  color: var(--text-sub);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: 8px 4px 12px;
}
.history-item {
  background: var(--bg-card);
  backdrop-filter: blur(16px);
  border-radius: var(--radius-sm);
  padding: 14px 16px;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 14px;
  box-shadow: var(--shadow-soft);
  border: 1px solid rgba(255,255,255,0.5);
  transition: transform 0.2s;
}
.history-item:hover { transform: translateX(4px); }
.history-dot {
  width: 10px; height: 10px;
  border-radius: 50%; flex-shrink: 0;
}
.history-dot.in  { background: #81D4FA; box-shadow: 0 0 6px #81D4FA; }
.history-dot.out { background: #F48FB1; box-shadow: 0 0 6px #F48FB1; }
.history-dot.temp { background: #FFCC80; box-shadow: 0 0 6px #FFCC80; }
.history-info { flex: 1; }
.history-action {
  font-size: 15px; font-weight: 800;
  color: var(--text-main);
}
.history-time {
  font-size: 13px; color: var(--text-sub);
  font-weight: 600;
  margin-top: 2px;
}
.history-status {
  font-size: 13px;
  font-weight: 800;
  padding: 4px 12px;
  border-radius: 20px;
  background: linear-gradient(135deg, var(--mint-green), var(--sky-blue));
  color: #2E7D5A;
}

/* ============================================================
   🍥 加载动画（奶龙旋转）
   ============================================================ */
.loading-overlay {
  display: none;
  position: fixed; inset: 0; z-index: 50;
  background: rgba(255, 249, 232, 0.92);
  backdrop-filter: blur(8px);
  align-items: center; justify-content: center;
  flex-direction: column;
}
.loading-overlay.show { display: flex; }
.nailong-loader {
  width: 80px; height: 80px;
  border-radius: 50%;
  object-fit: cover;
  animation: nailongSpin 1.2s ease-in-out infinite;
  box-shadow: 0 8px 24px rgba(255, 179, 71, 0.3);
}
@keyframes nailongSpin {
  0%   { transform: rotate(0deg) scale(1); }
  50%  { transform: rotate(180deg) scale(1.1); }
  100% { transform: rotate(360deg) scale(1); }
}
.loading-text {
  margin-top: 16px;
  font-size: 16px;
  font-weight: 700;
  color: var(--text-sub);
}

/* ============================================================
   🎉 结果弹窗（奶油风格）
   ============================================================ */
.result-overlay {
  display: none;
  position: fixed; inset: 0; z-index: 60;
  background: rgba(90, 74, 58, 0.25);
  align-items: flex-end; justify-content: center;
  backdrop-filter: blur(6px);
}
.result-overlay.show { display: flex; }
.result-sheet {
  background: linear-gradient(180deg, #FFFDF7 0%, #FFF9E8 100%);
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  padding: 20px 20px 36px;
  width: 100%;
  max-width: 480px;
  animation: slideUp 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  box-shadow: 0 -8px 40px rgba(0,0,0,0.12);
}
@keyframes slideUp {
  from { transform: translateY(100%); }
  to   { transform: translateY(0); }
}
.result-indicator {
  width: 40px; height: 5px;
  background: var(--cream-yellow);
  border-radius: 3px;
  margin: 0 auto 20px;
}
.result-icon {
  font-size: 52px;
  text-align: center;
  margin-bottom: 10px;
}
.result-title {
  font-size: 22px; font-weight: 900;
  text-align: center; color: var(--text-main);
  margin-bottom: 8px;
}
.result-msg {
  font-size: 15px; color: var(--text-sub);
  text-align: center;
  margin-bottom: 20px;
  line-height: 1.6;
  font-weight: 600;
}
.result-url {
  background: rgba(255,255,255,0.8);
  border-radius: var(--radius-sm);
  padding: 14px 16px;
  margin-bottom: 16px;
  word-break: break-all;
  font-size: 13px;
  color: #8B7355;
  font-family: 'SF Mono', 'Menlo', monospace;
  border: 2px dashed var(--cream-yellow);
}
.btn-cream {
  width: 100%; height: 54px;
  background: linear-gradient(135deg, var(--cream-yellow), var(--peach));
  color: var(--text-main);
  border: none;
  border-radius: var(--radius-sm);
  font-size: 17px;
  font-weight: 800;
  cursor: pointer;
  margin-bottom: 10px;
  transition: all 0.2s;
  box-shadow: 0 4px 16px rgba(255, 179, 71, 0.25);
  font-family: var(--font-cartoon);
}
.btn-cream:active {
  transform: scale(0.96);
  box-shadow: 0 2px 8px rgba(255, 179, 71, 0.2);
}
.btn-cream-secondary {
  width: 100%; height: 54px;
  background: rgba(255,255,255,0.7);
  color: var(--text-sub);
  border: 2px solid var(--cream-yellow);
  border-radius: var(--radius-sm);
  font-size: 17px;
  font-weight: 800;
  cursor: pointer;
  transition: all 0.2s;
  font-family: var(--font-cartoon);
}
.btn-cream-secondary:active { transform: scale(0.96); background: var(--cream-yellow); color: var(--text-main); }

/* ============================================================
   🍞 底部版本提示
   ============================================================ */
.footer {
  text-align: center;
  padding: 16px;
  font-size: 13px;
  color: var(--text-sub);
  font-weight: 600;
  line-height: 1.6;
}
.footer .heart { color: #FF8A80; }

/* ============================================================
   🔔 Toast
   ============================================================ */
.toast {
  position: fixed;
  bottom: 100px; left: 50%; transform: translateX(-50%);
  background: linear-gradient(135deg, var(--cream-yellow), var(--peach));
  color: var(--text-main);
  padding: 14px 28px;
  border-radius: var(--radius-xl);
  font-size: 15px;
  font-weight: 800;
  z-index: 200;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
  white-space: nowrap;
  box-shadow: var(--shadow-soft);
}
.toast.show { opacity: 1; }

/* ============================================================
   ⚠️ 错误提示
   ============================================================ */
.error-banner {
  display: none;
  background: linear-gradient(135deg, #FFE8E8, #FFF0F0);
  border: 2px solid #FFB3BA;
  border-radius: var(--radius-sm);
  padding: 14px 16px;
  margin-bottom: 16px;
  font-size: 14px;
  color: #E57373;
  line-height: 1.5;
  font-weight: 700;
}
.error-banner.show { display: block; }
.error-banner .retry-btn {
  color: #FF8A65;
  font-weight: 800;
  cursor: pointer;
  margin-left: 4px;
  text-decoration: underline;
}

/* ============================================================
   💻 电脑端适配
   ============================================================ */
@media (min-width: 768px) {
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }
  .phone-frame {
    width: 100%;
    max-width: 440px;
    min-height: auto;
    border-radius: var(--radius-xl);
    box-shadow: 0 20px 60px rgba(139, 119, 99, 0.2);
    overflow: hidden;
    background: var(--bg-page);
  }
}
</style>
</head>
<body>

<!-- ===== ☁️ 漂浮云朵 ===== -->
<div class="cloud cloud-1"></div>
<div class="cloud cloud-2"></div>
<div class="cloud cloud-3"></div>

<!-- ===== 🐉 迷你奶龙贴纸（页面边角） ===== -->
<div class="sticker sticker-tr">
  <img src="nailong3.png" alt="奶龙">
</div>
<div class="sticker sticker-bl">
  <img src="nailong5.png" alt="奶龙">
</div>
<div class="sticker sticker-br">
  <img src="nailong6.png" alt="奶龙">
</div>

<!-- ===== 📱 手机框架 ===== -->
<div class="phone-frame">

  <!-- ===== 🔝 顶部导航栏 ===== -->
  <nav class="top-nav">
    <div class="nav-left">
      <button class="menu-btn" onclick="toggleMenu()">☰</button>
      <span class="nav-title"><img src="nailong-icon.png" class="nav-icon" alt="">奶龙签到</span>
    </div>
    <span class="nav-time" id="navTime">9:41</span>
  </nav>

  <!-- ===== 📋 侧边菜单栏 ===== -->
  <div class="menu-overlay" id="menuOverlay" onclick="toggleMenu()"></div>
  <aside class="side-menu" id="sideMenu">
    <div class="menu-header">
      <img src="nailong3.png" class="menu-avatar" alt="奶龙头像">
      <h3>奶龙图书馆</h3>
      <p>SDUFE Library Check-in</p>
    </div>
    <div class="menu-list">
      <div class="menu-item" onclick="toggleMenu(); showToast('已刷新状态')">
        <span class="icon">🔄</span>
        <span>刷新状态</span>
      </div>
      <div class="menu-item" onclick="toggleMenu(); document.getElementById('historySection').scrollIntoView({behavior:'smooth'})">
        <span class="icon">📜</span>
        <span>今日记录</span>
        <span class="menu-badge" id="menuBadge" style="display:none">0</span>
      </div>
      <div class="menu-item" onclick="toggleMenu(); showToast('v2.2 奶龙主题版')">
        <span class="icon">ℹ️</span>
        <span>关于</span>
      </div>
    </div>
  </aside>

  <!-- ===== 🍰 内容区 ===== -->
  <main class="content">

    <!-- 错误提示 -->
    <div class="error-banner" id="errorBanner">
      <span id="errorText">网络错误，请连接校园网 SDUFE WiFi</span>
      <span class="retry-btn" onclick="retryTimestamp()">重试</span>
    </div>

    <!-- ===== 🎴 状态信息卡片 ===== -->
    <div class="status-card">
      <img src="nailong-urge.png" class="status-nailong" id="statusNailong" alt="奶龙状态">
      <div class="status-label">📡 当前状态</div>
      <div class="status-value">
        <span class="status-dot offline" id="statusDot"></span>
        <span id="statusValue">未连接</span>
      </div>
      <div class="status-detail" id="statusDetail">请连接校园网后自动获取状态</div>
    </div>

    <!-- ===== 🎯 快速操作三大功能卡片 ===== -->
    <div class="action-grid">
      <!-- 签到入馆 -->
      <div class="action-card checkin" onclick="doAction('1')">
        <!-- 奶龙背景图：100%不透明，无遮罩 -->
        <img src="nailong3.png" class="card-bg-img" alt="签到奶龙">
        <!-- 底部渐变文字底条（仅底部，非全卡片遮罩） -->
        <div class="card-text-bar"></div>
        <!-- hover 弹出迷你奶龙 -->
        <img src="nailong1.png" class="mini-nailong" alt="迷你奶龙">
        <div class="card-content">
          <div class="card-icon">📍</div>
          <div class="card-name">签到入馆</div>
          <div class="card-name-en">Check In</div>
        </div>
      </div>

      <!-- 临时离馆 -->
      <div class="action-card tempout" onclick="doAction('2')">
        <img src="nailong2.png" class="card-bg-img" alt="暂离奶龙">
        <div class="card-text-bar"></div>
        <img src="nailong4.png" class="mini-nailong" alt="迷你奶龙">
        <div class="card-content">
          <div class="card-icon">🚶</div>
          <div class="card-name">临时离馆</div>
          <div class="card-name-en">Temp Out</div>
        </div>
      </div>

      <!-- 签离出馆 -->
      <div class="action-card checkout" onclick="doAction('3')">
        <img src="nailong4.png" class="card-bg-img" alt="签离奶龙">
        <div class="card-text-bar"></div>
        <img src="nailong5.png" class="mini-nailong" alt="迷你奶龙">
        <div class="card-content">
          <div class="card-icon">🚪</div>
          <div class="card-name">签离出馆</div>
          <div class="card-name-en">Check Out</div>
        </div>
      </div>
    </div>

    <!-- ===== 📜 历史记录 ===== -->
    <div class="history-section" id="historySection" style="display:none;">
      <div class="history-title">📜 今日记录 · TODAY</div>
      <div id="historyList"></div>
    </div>

    <!-- ===== 🍞 底部版本提示 ===== -->
    <div class="footer">
      <span class="heart">❤</span> SDUFE Library Remote Check-in v2.2<br>
      奶龙奶油卡通风 · 请连接校园网使用
    </div>

  </main>
</div>

<!-- ===== 🍥 加载动画 ===== -->
<div class="loading-overlay" id="loading">
  <img src="nailong3.png" class="nailong-loader" alt="奶龙加载中">
  <div class="loading-text">奶龙正在获取时间...</div>
</div>

<!-- ===== 🎉 结果弹窗 ===== -->
<div class="result-overlay" id="resultOverlay" onclick="if(event.target===this)closeResult()">
  <div class="result-sheet">
    <div class="result-indicator"></div>
    <div class="result-icon" id="resultIcon">✅</div>
    <div class="result-title" id="resultTitle">操作成功</div>
    <div class="result-msg" id="resultMsg">请点击下方按钮跳转到图书馆</div>
    <div class="result-url" id="resultUrl" style="display:none;"></div>
    <button class="btn-cream" id="resultBtn" onclick="goToLibrary()">📱 跳转到图书馆</button>
    <button class="btn-cream-secondary" onclick="copyLink()" id="copyBtn">📋 复制链接</button>
  </div>
</div>

<!-- ===== 🔔 Toast ===== -->
<div class="toast" id="toast"></div>

<script>
// ============================================================
// 🎨 奶龙签到系统 · 原生 JS
// ============================================================

// ===== 时间更新 =====
function updateTime() {
  const now = new Date();
  let h = now.getHours(), m = now.getMinutes();
  document.getElementById('navTime').textContent =
    h + ':' + (m < 10 ? '0' : '') + m;
}
updateTime();
setInterval(updateTime, 30000);
renderCheckInStatus();

// ===== 菜单切换 =====
function toggleMenu() {
  document.getElementById('sideMenu').classList.toggle('open');
  document.getElementById('menuOverlay').classList.toggle('show');
}

// ===== 奶龙签到状态渲染 =====
function renderCheckInStatus() {
  const isCheckedIn = localStorage.getItem('checkedIn') === 'true';
  const nailongImg = document.getElementById('statusNailong');
  const statusValue = document.getElementById('statusValue');
  const statusDetail = document.getElementById('statusDetail');
  const statusDot = document.getElementById('statusDot');

  if (isCheckedIn) {
    nailongImg.src = 'nailong-happy.png';
    statusValue.textContent = '在馆学习中';
    statusDetail.textContent = '奶龙陪你加油鸭！';
    statusDot.classList.remove('offline');
  } else {
    nailongImg.src = 'nailong-urge.png';
    statusValue.textContent = '未签到';
    statusDetail.textContent = '快去签到！奶龙等急了';
    statusDot.classList.add('offline');
  }
}

// ===== 状态更新（网络健康检查） =====
function updateStatus() {
  fetch('https://libst.sdufe.edu.cn/api.php/v3qrtime', {
    mode: 'cors', cache: 'no-cache'
  }).then(r => r.json()).then(d => {
    if (d && d.status === 1) {
      document.getElementById('errorBanner').classList.remove('show');
      renderCheckInStatus();
    }
  }).catch(() => {
    document.getElementById('errorBanner').classList.add('show');
    document.getElementById('statusValue').textContent = '未连接';
    document.getElementById('statusDot').classList.add('offline');
    document.getElementById('statusDetail').textContent = '请连接校园网 SDUFE WiFi';
  });
}
setTimeout(updateStatus, 500);
setInterval(updateStatus, 60000);

function retryTimestamp() {
  document.getElementById('errorBanner').classList.remove('show');
  updateStatus();
  showToast('奶龙正在重试...');
}

// ===== 奶龙语音播报 =====
function speakNailong(text) {
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'zh-CN';
  u.pitch = 1.3;   // 音调高一点，奶龙声
  u.rate = 0.95;   // 稍微慢一点，可爱感
  u.volume = 1;
  // 尝试选中文女声
  const voices = window.speechSynthesis.getVoices();
  const zhVoice = voices.find(v => v.lang.startsWith('zh') && v.name.includes('Female'))
               || voices.find(v => v.lang.startsWith('zh'))
               || voices[0];
  if (zhVoice) u.voice = zhVoice;
  window.speechSynthesis.speak(u);
}
// 预加载语音列表（部分浏览器异步加载）
if ('speechSynthesis' in window) {
  window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
}

// ===== 核心操作 =====
let currentUrl = '';

function doAction(type) {
  const names = { '1': '签到入馆', '2': '临时离馆', '3': '签离出馆' };
  const msgs  = { '1': '签到成功啦~奶龙陪你学习！', '2': '临时离馆~记得早点回来哦！', '3': '签离出馆~奶龙明天见！' };

  document.getElementById('loading').classList.add('show');

  fetch('https://libst.sdufe.edu.cn/api.php/v3qrtime', { mode: 'cors', cache: 'no-cache' })
    .then(r => r.json())
    .then(d => {
      document.getElementById('loading').classList.remove('show');
      if (!d || d.status !== 1) {
        showToast('获取时间戳失败，请确认已连接校园网');
        return;
      }
      const ts = d.data;
      const url = 'http://www.skalibrary.net/wx/scancheck?school=sdufe&type=' + type + '&t=' + ts;
      currentUrl = url;

      // 保存签到状态
      if (type === '1') localStorage.setItem('checkedIn', 'true');
      if (type === '3') localStorage.setItem('checkedIn', 'false');
      // type '2' 临时离馆不改变状态
      renderCheckInStatus();

      addHistory(type, ts);

      // 奶龙语音播报
      speakNailong(msgs[type]);

      document.getElementById('resultIcon').textContent = '✅';
      document.getElementById('resultTitle').textContent = names[type] + ' 就绪';
      document.getElementById('resultMsg').textContent =
        '时间戳: ' + ts + '\n请在微信中打开链接完成' + names[type];
      document.getElementById('resultUrl').style.display = 'block';
      document.getElementById('resultUrl').textContent = url;
      document.getElementById('resultOverlay').classList.add('show');
    })
    .catch(() => {
      document.getElementById('loading').classList.remove('show');
      document.getElementById('errorBanner').classList.add('show');
      document.getElementById('errorText').textContent =
        '网络错误：无法连接图书馆服务器，请确认已连接 SDUFE 校园网';
    });
}

function goToLibrary() {
  if (!currentUrl) { showToast('链接为空'); return; }
  window.location.href = currentUrl;
}

function copyLink() {
  if (!currentUrl) { showToast('链接为空'); return; }
  if (navigator.clipboard) {
    navigator.clipboard.writeText(currentUrl).then(() => showToast('链接已复制'));
  } else {
    const ta = document.createElement('textarea');
    ta.value = currentUrl;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('链接已复制');
  }
}

function closeResult() {
  document.getElementById('resultOverlay').classList.remove('show');
}

// ===== 历史记录 =====
function addHistory(type, ts) {
  const names = { '1': '签到入馆', '2': '临时离馆', '3': '签离出馆' };
  const dots = { '1': 'in', '2': 'temp', '3': 'out' };

  const section = document.getElementById('historySection');
  section.style.display = 'block';

  const list = document.getElementById('historyList');
  const now = new Date();
  const timeStr = now.getHours() + ':' + (now.getMinutes() < 10 ? '0' : '') + now.getMinutes();

  const item = document.createElement('div');
  item.className = 'history-item';
  item.innerHTML =
    '<div class="history-dot ' + dots[type] + '"></div>' +
    '<div class="history-info">' +
      '<div class="history-action">' + names[type] + '</div>' +
      '<div class="history-time">' + timeStr + ' · 时间戳 ' + ts + '</div>' +
    '</div>' +
    '<div class="history-status">✓ 就绪</div>';
  list.insertBefore(item, list.firstChild);

  // 更新菜单badge
  const badge = document.getElementById('menuBadge');
  badge.textContent = list.children.length;
  badge.style.display = 'inline-block';
}

// ===== Toast =====
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ===== 点击弹窗遮罩关闭 =====
document.getElementById('resultOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeResult();
});
</script>
</body>
</html>
