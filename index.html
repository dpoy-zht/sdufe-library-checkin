<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SDUFE 图书馆签到</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.95); border-radius: 24px; padding: 36px 28px;
            max-width: 400px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }
        .header { text-align: center; margin-bottom: 32px; }
        .header h1 { font-size: 26px; color: #1a1a2e; margin-bottom: 6px; }
        .header p { font-size: 13px; color: #888; }
        .btn-row { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
        .btn {
            width: 100%; padding: 17px; border: none; border-radius: 14px;
            font-size: 17px; font-weight: 600; cursor: pointer; color: #fff;
            transition: transform 0.15s, opacity 0.15s;
        }
        .btn:active { transform: scale(0.97); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .btn-in   { background: linear-gradient(135deg, #11998e, #38ef7d); }
        .btn-away { background: linear-gradient(135deg, #f093fb, #f5576c); }
        .btn-out  { background: linear-gradient(135deg, #4facfe, #00f2fe); }
        .toast {
            text-align: center; padding: 14px; border-radius: 12px; font-size: 14px;
            margin-bottom: 16px; display: none; animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-6px); } }
        .toast.loading { background: #e3f2fd; color: #1976d2; display: block; }
        .toast.success { background: #e8f5e9; color: #2e7d32; display: block; }
        .toast.error   { background: #ffebee; color: #c62828; display: block; }
        .jump-card {
            background: #f0fdf4; border: 2px solid #22c55e; border-radius: 16px;
            padding: 24px 20px; text-align: center; display: none; animation: fadeIn 0.4s ease;
        }
        .jump-card h3 { color: #166534; font-size: 16px; margin-bottom: 16px; }
        .jump-btn {
            display: inline-block; width: 100%; padding: 16px;
            background: linear-gradient(135deg, #22c55e, #16a34a); color: #fff;
            border: none; border-radius: 12px; font-size: 17px; font-weight: 700;
            text-decoration: none; cursor: pointer;
        }
        .jump-btn:active { transform: scale(0.97); }
        .copy-row { display: flex; gap: 8px; margin-top: 14px; }
        .copy-input {
            flex: 1; padding: 10px 12px; border: 1px solid #d1d5db;
            border-radius: 8px; font-size: 11px; color: #374151; background: #f9fafb;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .copy-btn {
            padding: 10px 16px; background: #6366f1; color: #fff;
            border: none; border-radius: 8px; font-size: 13px; cursor: pointer; white-space: nowrap;
        }
        .copy-btn.copied { background: #22c55e; }
        .tips {
            background: #f8f9fa; border-radius: 12px; padding: 14px;
            font-size: 12px; color: #666; line-height: 1.7; margin-top: 16px;
        }
        .tips strong { color: #333; }
        .tips .warn { color: #e65100; font-weight: 600; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="card" id="appCard">
    <div class="header">
        <h1>📚 图书馆签到</h1>
        <p>山东财经大学 · 远程签到系统</p>
    </div>

    <div class="toast" id="toast"></div>

    <div class="btn-row" id="btnArea">
        <button class="btn btn-in"   onclick="doCheckin('1')">✅ 签到入馆</button>
        <button class="btn btn-away" onclick="doCheckin('2')">🚶 临时离馆</button>
        <button class="btn btn-out"  onclick="doCheckin('3')">🚪 签离出馆</button>
    </div>

    <div class="jump-card" id="jumpCard">
        <h3 id="jumpTitle">签到入馆</h3>
        <a class="jump-btn" id="jumpLink" href="#" target="_self">👆 点击此处跳转到图书馆</a>
        <div class="copy-row">
            <input class="copy-input" id="linkInput" readonly>
            <button class="copy-btn" id="copyBtn" onclick="copyLink()">📋 复制</button>
        </div>
    </div>

    <div class="tips">
        <strong>📖 使用说明</strong><br>
        ① 手机必须连接校园网 <strong>SDUFE</strong><br>
        ② 确保已在<b>山东财经大学图书馆</b>公众号登录<br>
        ③ 点击按钮后，<b style="color:#22c55e;">手动点击跳转链接</b>完成签到<br>
        <span class="warn">⚠ 暂离时间上限 100 分钟（中午除外）</span>
    </div>
</div>

<script>
// ==================== 密码验证 ====================
(function() {
    const KEY = [7,3,9,1,5,8,2,4,6,7];
    const ENC = "816b7d7b6d7c3a3c3e3f";
    function verify(pwd) {
        if (pwd.length !== KEY.length) return false;
        const hex = pwd.split('').map((c,i) => (c.charCodeAt(0)+KEY[i]).toString(16).padStart(2,'0')).join('');
        return hex === ENC;
    }
    if (localStorage.getItem('lib_auth') === '1') return;
    const input = prompt('🔐 请输入访问密码：');
    if (!input) { document.body.innerHTML = '<h2 style="color:#fff;text-align:center;margin-top:80px;">访问已取消</h2>'; return; }
    if (!verify(input)) { document.body.innerHTML = '<h2 style="color:#fff;text-align:center;margin-top:80px;">密码错误，访问被拒绝</h2>'; return; }
    localStorage.setItem('lib_auth', '1');
})();

// ==================== 主逻辑 ====================
const API = 'https://libst.sdufe.edu.cn/api.php/v3qrtime';
const BASE = 'http://www.skalibrary.net/wx/scancheck';
const toast = document.getElementById('toast');
const jumpCard = document.getElementById('jumpCard');
const jumpLink = document.getElementById('jumpLink');
const linkInp = document.getElementById('linkInput');
const copyBtn = document.getElementById('copyBtn');

function showToast(msg, cls) { toast.textContent = msg; toast.className = 'toast ' + cls; }

async function doCheckin(type) {
    const names = {'1':'签到入馆','2':'临时离馆','3':'签离出馆'};
    showToast('⏳ 正在获取服务器时间戳...', 'loading');
    jumpCard.style.display = 'none';
    document.querySelectorAll('#btnArea .btn').forEach(b => b.disabled = true);

    try {
        const resp = await fetch(API + '?_=' + Date.now(), {
            headers: { 'Accept': 'application/json' },
            signal: AbortSignal.timeout(10000)
        });
        const data = await resp.json();

        if (data.status !== 1 || !data.data) {
            showToast('❌ ' + (data.msg || '服务器异常，请确认已连接 SDUFE WiFi'), 'error');
            document.querySelectorAll('#btnArea .btn').forEach(b => b.disabled = false);
            return;
        }

        const url = BASE + '?school=sdufe&type=' + type + '&t=' + data.data;
        showToast('✅ 链接已生成，请点击下方按钮跳转', 'success');
        document.getElementById('btnArea').classList.add('hidden');
        document.getElementById('jumpTitle').textContent = '👉 ' + names[type];
        jumpLink.href = url; linkInp.value = url;
        copyBtn.textContent = '📋 复制'; copyBtn.className = 'copy-btn';
        jumpCard.style.display = 'block';
    } catch (e) {
        showToast('❌ ' + e.message + '<br><small>请确认已连接 SDUFE WiFi</small>', 'error');
        document.querySelectorAll('#btnArea .btn').forEach(b => b.disabled = false);
    }
}

async function copyLink() {
    try {
        await navigator.clipboard.writeText(linkInp.value);
        copyBtn.textContent = '✅ 已复制'; copyBtn.className = 'copy-btn copied';
        setTimeout(() => { copyBtn.textContent = '📋 复制'; copyBtn.className = 'copy-btn'; }, 2000);
    } catch(_) {
        linkInp.select(); document.execCommand('copy');
        copyBtn.textContent = '✅ 已复制'; copyBtn.className = 'copy-btn copied';
        setTimeout(() => { copyBtn.textContent = '📋 复制'; copyBtn.className = 'copy-btn'; }, 2000);
    }
}
</script>
</body>
</html>
